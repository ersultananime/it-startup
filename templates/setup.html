<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Step by Step — Настройка профиля</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mint: { 50:'#f0fdf8', 100:'#dcfce8', 200:'#bbf7d0', 300:'#86efac', 400:'#4ade80', 500:'#22c55e' },
            sky:  { 50:'#f0f9ff', 100:'#e0f2fe', 200:'#bae6fd', 300:'#7dd3fc', 400:'#38bdf8', 500:'#0ea5e9' }
          },
          fontFamily: { sans: ['Inter','ui-sans-serif','system-ui'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #f0fdf8 0%, #e0f2fe 50%, #f0fdf8 100%); }
    .card { backdrop-filter: blur(10px); background: rgba(255,255,255,0.85); }
    .input-field {
      @apply w-full px-4 py-3 rounded-xl border border-mint-200 bg-white/70 text-slate-700
             focus:outline-none focus:ring-2 focus:ring-mint-400 focus:border-transparent
             placeholder-slate-400 transition-all duration-200;
    }
    .btn-primary {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      transition: all 0.3s ease;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(34,197,94,0.35); }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-lg">

    <!-- Logo / Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-mint-400 to-sky-400 mb-4 shadow-lg">
        <span class="text-3xl">🏃</span>
      </div>
      <h1 class="text-3xl font-bold text-slate-800">Step by Step</h1>
      <p class="text-slate-500 mt-2 text-sm">Расскажи о себе — без давления, только факты</p>
    </div>

    <!-- Card -->
    <div class="card rounded-3xl shadow-xl p-8 border border-white/60">
      <form action="/setup" method="POST" class="space-y-5">

        <!-- Name -->
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1.5">Как тебя зовут?</label>
          <input class="input-field" type="text" name="name" placeholder="Например: Алина" required />
        </div>

        <!-- Height -->
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1.5">Ваш рост (см)</label>
          <input class="input-field" type="number" name="height_cm" step="1" min="100" max="250"
                 placeholder="Например: 175" required />
        </div>

        <!-- Target value + daily target side by side -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-600 mb-1.5">Текущий вес (кг)</label>
            <input class="input-field" type="number" name="current_weight_kg" step="0.1" min="30" max="300"
                   placeholder="Например: 95" required />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-600 mb-1.5">Целевой вес (кг)</label>
            <input class="input-field" type="number" name="target_weight_kg" step="0.1" min="30" max="300"
                   placeholder="Например: 75" required />
          </div>
        </div>

        <!-- Submit -->
        <button type="submit"
                class="btn-primary w-full py-3.5 rounded-xl text-white font-semibold text-base mt-2 shadow-md">
          Начать путь 🚀
        </button>

      </form>
    </div>

    <!-- Footer note -->
    <p class="text-center text-xs text-slate-400 mt-6">
      Нет идеальных условий для старта. Есть только сейчас. 💚
    </p>

  </div>
</body>
</html>
